  html.dark #bio-modal .bg-white { background-color: #161b22; }
  html.dark #bio-modal h2,
  html.dark #bio-modal h3,
  html.dark #bio-modal .text-gray-700,
  html.dark #bio-modal .text-gray-900 { color: #c9d1d9; }
  html.dark #bio-modal p,
  html.dark #bio-modal .text-gray-600,
  html.dark #bio-modal .text-gray-500 { color: #8b949e; }
  html.light #bio-modal button:hover { color: #111827; }
  html.dark #bio-modal button:hover { color: #c9d1d9; }
</style>
<script>
  const getSystemPreference = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

  const applyTheme = () => {
    const theme = localStorage.theme ?? 'system';
    const isDark = theme === 'system' ? getSystemPreference() : theme === 'dark';
    document.documentElement.classList.toggle('light', !isDark);
    document.documentElement.classList.toggle('dark', isDark);
    ['system', 'light', 'dark'].forEach((key) => {
      const btn = document.getElementById(`theme-${key}`);
      if (btn) btn.classList.toggle('theme-active', key === theme);
    });
  };

  const setTheme = (theme) => {
    if (theme === 'system') {
      localStorage.removeItem('theme');
    } else {
      localStorage.theme = theme;
    }
    applyTheme();
  };

  const initEmail = () => {
    const emailLink = document.getElementById('email-link');
    const emailText = document.getElementById('email-text');
    if (emailLink && emailText) {
      const email = atob('bWVAa3VzYWt1LnN1');
      emailLink.href = `mailto:${email}?subject=Hello&body=Hi%20Kirill%2C%20I%20found%20you%20via%20your%20site`;
      emailText.textContent = email;
    }
  };

  const toggleBio = () => {
    const modal = document.getElementById('bio-modal');
    if (!modal) return;
    const isHidden = modal.classList.toggle('hidden');
    document.body.style.overflow = isHidden ? '' : 'hidden';
  };

  const closeBio = () => {
    document.getElementById('bio-modal')?.classList.add('hidden');
    document.body.style.overflow = '';
  };

  const init = () => {
    applyTheme();
    initEmail();
    ['system', 'light', 'dark'].forEach((theme) => {
      document.getElementById(`theme-${theme}`)?.addEventListener('click', () => setTheme(theme));
    });
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (!localStorage.theme || localStorage.theme === 'system') applyTheme();
    });
  };

  document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', init)
    : init();
</script>
