<script>
  (function () {
    var theme = localStorage.theme || 'system';
    var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.classList.toggle('dark', isDark);
    document.documentElement.classList.toggle('light', !isDark);
  })();
</script>

<script>
  const getBlogSystemPreference = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

  const applyBlogTheme = () => {
    const theme = localStorage.theme ?? 'system';
    const isDark = theme === 'system' ? getBlogSystemPreference() : theme === 'dark';
    document.documentElement.classList.toggle('light', !isDark);
    document.documentElement.classList.toggle('dark', isDark);
    ['system', 'light', 'dark'].forEach((key) => {
      const btn = document.getElementById(`theme-${key}`);
      if (btn) btn.classList.toggle('theme-active', key === theme);
    });
  };

  const setBlogTheme = (theme) => {
    if (theme === 'system') {
      localStorage.removeItem('theme');
    } else {
      localStorage.theme = theme;
    }
    applyBlogTheme();
  };

  const initBlogTheme = () => {
    applyBlogTheme();
    ['system', 'light', 'dark'].forEach((theme) => {
      document.getElementById(`theme-${theme}`)?.addEventListener('click', () => setBlogTheme(theme));
    });
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (!localStorage.theme || localStorage.theme === 'system') applyBlogTheme();
    });
  };

  document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', initBlogTheme)
    : initBlogTheme();
</script>
